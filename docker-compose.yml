services:
  postgresql:
    image: postgres:15
    environment:
      POSTGRES_PASSWORD: temporal
      POSTGRES_USER: temporal
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U temporal"]
      interval: 5s
      timeout: 5s
      retries: 10

  temporal:
    image: temporalio/auto-setup:latest
    depends_on:
      postgresql:
        condition: service_healthy
    ports:
      - "7233:7233"
    environment:
      - DB=postgres12
      - DB_PORT=5432
      - POSTGRES_USER=temporal
      - POSTGRES_PWD=temporal
      - POSTGRES_SEEDS=postgresql
    healthcheck:
      test: ["CMD", "tctl", "--address", "temporal:7233", "cluster", "health"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  temporal-ui:
    image: temporalio/ui:latest
    depends_on:
      - temporal
    ports:
      - "8080:8080"
    environment:
      - TEMPORAL_ADDRESS=temporal:7233
      - TEMPORAL_CORS_ORIGINS=http://localhost:8080

  api:
    build: .
    command: python -m uvicorn src.api.app:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      - TEMPORAL_HOST=temporal:7233
    volumes:
      - .:/app
      - ./data:/app/data
      - ./prompts:/app/prompts

  worker:
    build: .
    command: python -m src.workflow.worker
    depends_on:
      temporal:
        condition: service_healthy
    env_file: .env
    environment:
      - TEMPORAL_HOST=temporal:7233
    volumes:
      - .:/app
      - ./data:/app/data
      - ./prompts:/app/prompts

volumes:
  pgdata:
